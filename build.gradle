plugins {
	id 'net.fabricmc.fabric-loom-remap' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

repositories {
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"pocket_dimension" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}
}

dependencies {
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
	modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"
	modImplementation "com.moandjiezana.toml:toml4j:0.7.2"
	include "com.moandjiezana.toml:toml4j:0.7.2"
}

processResources {
	def version = project.version
	inputs.property "version", version
	filesMatching("fabric.mod.json") {
		expand "version": version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 21
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

jar {
	def projectName = project.name
	inputs.property "projectName", projectName
	from("LICENSE") {
		rename { "${it}_$projectName"}
	}
}

publishing {
	publications {
		create("mavenJava", MavenPublication) {
			from components.java
		}
	}
	repositories {
	}
}

task dumpNbt(type: JavaExec) {
    mainClass = 'org.renwixx.pocketdimension.NbtDumper'
    classpath = sourceSets.main.runtimeClasspath
}
task dumpBlockEntity {
    doLast {
        def cl = sourceSets.main.compileClasspath
        def urls = cl.files.collect { it.toURI().toURL() }
        def loader = new java.net.URLClassLoader(urls as java.net.URL[])
        def clazz = loader.loadClass('net.minecraft.block.entity.BlockEntity')
        clazz.getDeclaredMethods().each { println it.name + ' ' + it.parameterTypes }
    }
}


task dumpViews {
