task dumpRenderLayer {
    doLast {
        def cl = sourceSets.client.compileClasspath
        def urls = cl.files.collect { it.toURI().toURL() }
        def loader = new java.net.URLClassLoader(urls as java.net.URL[])
        try {
            def clazz = loader.loadClass('net.minecraft.client.render.BlockRenderLayer')
            println '--- FIELDS ---'
            clazz.getDeclaredFields().each { println it.name + ' ' + it.type.name }
        } catch (Exception e) {
            e.printStackTrace()
        }
    }
}

